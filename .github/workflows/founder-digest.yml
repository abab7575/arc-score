name: Founder Daily Digest

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

env:
  BASE_URL: https://www.arcreport.ai

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send founder digest
        run: |
          echo "Triggering founder digest: ${BASE_URL}/api/cron/founder-digest"

          RESPONSE=$(curl -s --max-time 180 -w "\n%{http_code}" -X POST \
            "${BASE_URL}/api/cron/founder-digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Founder digest failed with status $HTTP_CODE"
            exit 1
          fi
