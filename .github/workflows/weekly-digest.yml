name: Weekly Digest Email

on:
  schedule:
    # Run every Sunday at 10 AM UTC
    - cron: "0 10 * * 0"
  workflow_dispatch:

env:
  BASE_URL: https://www.arcreport.ai

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send weekly digest emails
        run: |
          echo "Triggering weekly digest: ${BASE_URL}/api/cron/weekly-digest"

          RESPONSE=$(curl -s --max-time 120 -w "\n%{http_code}" -X POST \
            "${BASE_URL}/api/cron/weekly-digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Weekly digest failed with status $HTTP_CODE"
            exit 1
          fi
